<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Menu digital da King Club Lounge em São Carlos. Bebidas, cervejas, baldes, caipirinhas, combos e petiscos."
    />
    <meta name="theme-color" content="#0d0d0d" />
    <title>King Club Lounge | Menu Digital</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <img src="./assets/king-logo.png" alt="King Club Lounge" class="brand-logo" />
        <div>
          <p class="eyebrow">King Club Lounge</p>
          <h1>Menu Digital</h1>
          <p class="subtitle">Escolha seu pedido e solicite ao atendimento</p>
        </div>
      </div>

      <nav class="category-nav" aria-label="Categorias do cardápio">
        <button type="button" data-target="bebidas">Bebidas</button>
        <button type="button" data-target="cervejas">Cervejas</button>
        <button type="button" data-target="baldes">Baldes</button>
        <button type="button" data-target="caipirinhas">Caipirinhas</button>
        <button type="button" data-target="copoes">Copões</button>
        <button type="button" data-target="doses">Doses</button>
        <button type="button" data-target="combos">Combos</button>
        <button type="button" data-target="petiscos">Petiscos</button>
      </nav>
    </header>

    <main class="page-shell">
      <section class="intro" aria-label="Apresentação">
        <p>Cardápio fixo da casa</p>
        <strong>Escolha com facilidade e peça direto ao atendimento.</strong>
      </section>

      <div id="menu-root" class="menu-grid"></div>
    </main>

    <a class="floating-reserve" id="reserveButton" href="#" target="_blank" rel="noopener">
      Reservar Mesa
    </a>

    <footer class="footer">
      <img src="./assets/king-logo.png" alt="" class="footer-logo" />
      <h2>King Club Lounge</h2>
      <p>Rua Episcopal, 1423 - São Carlos/SP</p>
      <p>
        Instagram:
        <a href="https://www.instagram.com/king_club_lounge/" target="_blank" rel="noopener">
          @king_club_lounge
        </a>
      </p>
      <a
        class="instagram-button"
        href="https://www.instagram.com/king_club_lounge/"
        target="_blank"
        rel="noopener"
      >
        Seguir no Instagram
      </a>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
